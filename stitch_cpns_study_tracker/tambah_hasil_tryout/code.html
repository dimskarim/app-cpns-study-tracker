<style>
        body {
            font-family: 'Inter', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        .glass-header {
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }
        .shadow-primary-soft {
            box-shadow: 0px 8px 32px rgba(37, 99, 235, 0.08);
        }
        .btn-gradient {
            background: linear-gradient(135deg, #2563eb 0%, #60a5fa 100%);
        }
        input:focus, textarea:focus {
            outline: none;
            border-color: #2563eb !important;
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1);
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            display: inline-block;
            vertical-align: middle;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="bg-background text-on-surface min-h-screen pb-safe">
<!-- Top AppBar (Suppressed normal shell for task-focused journey) -->
<header class="fixed top-0 left-0 w-full z-50 flex justify-between items-center px-margin-mobile py-sm glass-header bg-surface/70 border-b border-outline-variant/30">
<button class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-surface-container-low transition-colors" onclick="history.back()">
<span class="material-symbols-outlined text-on-surface">arrow_back</span>
</button>
<h1 class="font-headline-sm text-headline-sm font-bold text-primary">Tambah Hasil</h1>
<button class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-surface-container-low transition-colors">
<span class="material-symbols-outlined text-on-surface-variant">close</span>
</button>
</header>
<main class="pt-20 px-margin-mobile pb-32 max-w-md mx-auto">
<!-- Instructional Text -->
<div class="mb-lg">
<h2 class="font-headline-sm text-headline-sm text-on-surface mb-xs">Data Tryout</h2>
<p class="font-label-md text-label-md text-on-surface-variant">Masukkan skor per materi sesuai hasil simulasi kamu.</p>
</div>
<!-- Main Form -->
<form class="space-y-lg" id="tryoutForm">
<!-- Date Picker -->
<div class="space-y-xs">
<label class="font-label-md text-label-md text-on-surface-variant block ml-1" for="tanggal">Tanggal Tryout</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline">calendar_today</span>
<input class="w-full pl-12 pr-4 py-3 bg-surface-container-lowest border border-outline-variant rounded-xl font-body-md text-body-md focus:ring-0 transition-all" id="tanggal" name="tanggal" type="date" value="2023-11-15">
</div>
</div>
<!-- Score Grid -->
<div class="grid grid-cols-1 gap-md">
<!-- TWK -->
<div class="bg-surface-container-lowest p-md rounded-xl border border-outline-variant shadow-primary-soft">
<div class="flex justify-between items-center mb-sm">
<label class="font-label-md text-label-md text-primary font-bold" for="twk">TWK</label>
<span class="font-caption text-caption text-on-surface-variant">Maks 175</span>
</div>
<div class="relative">
<input class="score-input w-full px-4 py-3 bg-surface border border-outline-variant rounded-lg font-body-md text-body-md focus:ring-0 transition-all text-center font-bold text-headline-sm" id="twk" max="175" min="0" name="twk" placeholder="0 - 175" type="number">
</div>
<p class="mt-2 font-caption text-caption text-on-surface-variant italic">Tes Wawasan Kebangsaan</p>
</div>
<!-- TIU -->
<div class="bg-surface-container-lowest p-md rounded-xl border border-outline-variant shadow-primary-soft">
<div class="flex justify-between items-center mb-sm">
<label class="font-label-md text-label-md text-primary font-bold" for="tiu">TIU</label>
<span class="font-caption text-caption text-on-surface-variant">Maks 175</span>
</div>
<div class="relative">
<input class="score-input w-full px-4 py-3 bg-surface border border-outline-variant rounded-lg font-body-md text-body-md focus:ring-0 transition-all text-center font-bold text-headline-sm" id="tiu" max="175" min="0" name="tiu" placeholder="0 - 175" type="number">
</div>
<p class="mt-2 font-caption text-caption text-on-surface-variant italic">Tes Intelegensia Umum</p>
</div>
<!-- TKP -->
<div class="bg-surface-container-lowest p-md rounded-xl border border-outline-variant shadow-primary-soft">
<div class="flex justify-between items-center mb-sm">
<label class="font-label-md text-label-md text-primary font-bold" for="tkp">TKP</label>
<span class="font-caption text-caption text-on-surface-variant">Maks 225</span>
</div>
<div class="relative">
<input class="score-input w-full px-4 py-3 bg-surface border border-outline-variant rounded-lg font-body-md text-body-md focus:ring-0 transition-all text-center font-bold text-headline-sm" id="tkp" max="225" min="0" name="tkp" placeholder="0 - 225" type="number">
</div>
<p class="mt-2 font-caption text-caption text-on-surface-variant italic">Tes Karakteristik Pribadi</p>
</div>
</div>
<!-- Note Area -->
<div class="space-y-xs">
<label class="font-label-md text-label-md text-on-surface-variant block ml-1" for="catatan">Catatan</label>
<textarea class="w-full px-4 py-3 bg-surface-container-lowest border border-outline-variant rounded-xl font-body-md text-body-md focus:ring-0 transition-all resize-none" id="catatan" name="catatan" placeholder="Contoh: Simulasi Mandiri #12 - Fokus di TIU Analitis" rows="3"></textarea>
</div>
</form>
</main>
<!-- Bottom Action Bar (Fixed) -->
<div class="fixed bottom-0 left-0 w-full p-margin-mobile bg-surface/80 backdrop-blur-lg border-t border-outline-variant/30 z-50">
<div class="max-w-md mx-auto flex flex-col gap-md">
<!-- Summary Card -->
<div class="flex items-center justify-between bg-primary-container text-on-primary-container px-lg py-sm rounded-full shadow-lg transition-transform duration-300" id="totalCard">
<span class="font-label-md text-label-md font-bold uppercase tracking-wider">Total Skor</span>
<span class="font-headline-sm text-headline-sm font-extrabold" id="totalScore">0</span>
</div>
<button class="btn-gradient w-full py-4 rounded-xl text-white font-headline-sm shadow-xl active:scale-95 transition-all flex items-center justify-center gap-2" form="tryoutForm" type="submit">
<span>Simpan Hasil</span>
<span class="material-symbols-outlined">save</span>
</button>
</div>
</div>
<!-- Decorative background element -->
<div class="fixed inset-0 pointer-events-none -z-10 opacity-20">

</div>
<script>
        document.addEventListener('DOMContentLoaded', () => {
            const inputs = document.querySelectorAll('.score-input');
            const totalDisplay = document.getElementById('totalScore');
            const totalCard = document.getElementById('totalCard');

            const calculateTotal = () => {
                let total = 0;
                inputs.forEach(input => {
                    const val = parseInt(input.value) || 0;
                    total += val;
                });
                
                // Animate value update
                const startVal = parseInt(totalDisplay.innerText);
                animateValue(totalDisplay, startVal, total, 400);

                // Simple feedback effect
                totalCard.classList.add('scale-105');
                setTimeout(() => totalCard.classList.remove('scale-105'), 200);
            };

            function animateValue(obj, start, end, duration) {
                let startTimestamp = null;
                const step = (timestamp) => {
                    if (!startTimestamp) startTimestamp = timestamp;
                    const progress = Math.min((timestamp - startTimestamp) / duration, 1);
                    obj.innerHTML = Math.floor(progress * (end - start) + start);
                    if (progress < 1) {
                        window.requestAnimationFrame(step);
                    }
                };
                window.requestAnimationFrame(step);
            }

            inputs.forEach(input => {
                input.addEventListener('input', calculateTotal);
            });

            // Form submission logic
            const form = document.getElementById('tryoutForm');
            form.addEventListener('submit', (e) => {
                e.preventDefault();
                const btn = e.target.querySelector('button[type="submit"]');
                const originalText = btn.innerHTML;
                
                btn.innerHTML = `<span class="material-symbols-outlined animate-spin">sync</span> Menyimpan...`;
                btn.classList.add('opacity-80');
                
                setTimeout(() => {
                    btn.innerHTML = `<span class="material-symbols-outlined">check_circle</span> Berhasil Disimpan`;
                    btn.classList.remove('btn-gradient');
                    btn.classList.add('bg-tertiary-container', 'text-on-tertiary-container');
                    
                    setTimeout(() => {
                        // Normally would redirect here
                        alert('Data simulasi tryout berhasil disimpan ke statistik belajar Anda.');
                        btn.innerHTML = originalText;
                        btn.classList.add('btn-gradient');
                        btn.classList.remove('bg-tertiary-container', 'text-on-tertiary-container', 'opacity-80');
                    }, 1500);
                }, 1000);
            });
        });
    </script>
</body></html>

<script>
        // Simple micro-interaction for theme toggle
        const themeToggle = document.getElementById('theme-toggle');
        themeToggle.addEventListener('change', () => {
            document.documentElement.classList.toggle('dark');
            
            // Visual feedback
            const container = themeToggle.closest('.bg-surface-container-low');
            container.classList.add('ring-2', 'ring-primary/20');
            setTimeout(() => {
                container.classList.remove('ring-2', 'ring-primary/20');
            }, 300);
        });

        // Add press effect to list items
        document.querySelectorAll('button').forEach(btn => {
            btn.addEventListener('touchstart', () => {
                btn.classList.add('opacity-70');
            });
            btn.addEventListener('touchend', () => {
                btn.classList.remove('opacity-70');
            });
        });
    </script>
